<html>
<title>speak.js: Text-to-Speech on the Web</title>
<head>

  <script src="speakClient.js"></script>
</head>
<body>
  <h1>hawking.js</h1>
  <h2>A Brief History of Time - read by Stephen Hawking's voice synthesizer</h2>
  <form onsubmit="play(); return false">
    <input type="submit" value="play">
  </form>
  <hr>
  <p>
    created using the speak.js library ported from C++ by kripken on GitHub
  </p>
  <hr>

  <div id="audio"></div>
  <p id="briefhistory">
  </p>
  <script>
    var sentencenum = 0
    var request = new XMLHttpRequest();
    request.open('GET', '/briefhistory.txt', false);  // `false` makes the request synchronous
    request.send(null);
    var text, textarr
    if (request.status === 200) {
      text = request.responseText
      document.getElementById("briefhistory").innerText = text
      textarr = text.match(/["’]?[A-Z][^.?!]+((?![.?!][’"]?\s["’]?[A-Z][^.?!]).)+[.?!’"]+/gm)
      console.log(textarr)

    }
    function play() {

      console.log(textarr[sentencenum])
      speak(textarr[sentencenum], { amplitude: 100, wordgap: 0, pitch: 50, speed: 175 });

      sentencenum++
      setInterval(function(){speak(textarr[sentencenum], { amplitude: 100, wordgap: 0, pitch: 50, speed: 175 }); sentencenum++}, 8  000)
    }

  </script>
</body>
</html>
